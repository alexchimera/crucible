services:
  db:
    image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crucible}
      POSTGRES_USER: ${POSTGRES_USER:-crucible}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crucible}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crucible}:${POSTGRES_PASSWORD:-crucible}@db:5432/${POSTGRES_DB:-crucible}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      target: dev
    command: bun run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
